name: Android CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure release signing
        if: github.event.inputs.build_type == 'release'
        env:
          RELEASE_STORE_FILE_BASE64: ${{ secrets.RELEASE_STORE_FILE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          mkdir -p app/keystore
          echo "$RELEASE_STORE_FILE_BASE64" | base64 -d > app/keystore/release.keystore
          cat > local.properties <<EOF
          sdk.dir=$ANDROID_SDK_ROOT
          RELEASE_STORE_FILE=app/keystore/release.keystore
          RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD
          RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS
          RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD
          EOF

      - name: Configure SDK only (debug)
        if: github.event.inputs.build_type != 'release'
        run: |
          cat > local.properties <<EOF
          sdk.dir=$ANDROID_SDK_ROOT
          EOF

      - name: Build debug APK
        if: github.event.inputs.build_type != 'release'
        run: ./gradlew :app:assembleDebug

      - name: Build release APK
        if: github.event.inputs.build_type == 'release'
        run: ./gradlew :app:assembleRelease

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename debug APK
        if: github.event.inputs.build_type != 'release'
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/app-debug.apk "output/ffmpeg_tools_armv8a_${{ steps.version.outputs.version }}.apk"

      - name: Rename release APK
        if: github.event.inputs.build_type == 'release'
        run: |
          mkdir -p output
          cp app/build/outputs/apk/release/app-release.apk "output/ffmpeg_tools_armv8a_${{ steps.version.outputs.version }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg_tools_armv8a_${{ steps.version.outputs.version }}
          path: output/*.apk
