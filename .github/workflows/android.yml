name: Android Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up Android NDK r28c
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          link-to-sdk: true

      - name: Install FFmpeg build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config meson cmake git nasm

      - name: Cache FFmpeg deps
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            deps
            Android-ffmpeg
          key: ffmpeg-deps-${{ runner.os }}-${{ hashFiles('scripts/build-ffmpeg-android.sh', 'scripts/clone-deps.sh', 'scripts/x265-android-toolchain.cmake') }}

      - name: Clone FFmpeg deps
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: bash scripts/clone-deps.sh

      - name: Build FFmpeg
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_HOME }}
        run: bash scripts/build-ffmpeg-android.sh

      - name: Copy FFmpeg binaries to assets
        run: |
          mkdir -p app/src/main/assets/ffmpeg/arm64-v8a
          cp Android-ffmpeg/ffmpeg app/src/main/assets/ffmpeg/arm64-v8a/ffmpeg
          cp Android-ffmpeg/ffprobe app/src/main/assets/ffmpeg/arm64-v8a/ffprobe
          cp Android-ffmpeg/libc++_shared.so app/src/main/assets/ffmpeg/arm64-v8a/libc++_shared.so

      - name: Validate keystore base64
        env:
          RELEASE_STORE_FILE_BASE64: ${{ secrets.RELEASE_STORE_FILE_BASE64 }}
        run: |
          test -n "$RELEASE_STORE_FILE_BASE64"
          printf '%s' "$RELEASE_STORE_FILE_BASE64" | base64 -d > /dev/null

      - name: Configure release signing
        env:
          RELEASE_STORE_FILE_BASE64: ${{ secrets.RELEASE_STORE_FILE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          test -n "$RELEASE_STORE_FILE_BASE64"
          test -n "$RELEASE_STORE_PASSWORD"
          test -n "$RELEASE_KEY_ALIAS"
          test -n "$RELEASE_KEY_PASSWORD"

          mkdir -p keystore
          printf '%s' "$RELEASE_STORE_FILE_BASE64" | base64 -d > keystore/release.keystore
          cat > local.properties <<EOF
          sdk.dir=$ANDROID_SDK_ROOT
          RELEASE_STORE_FILE=keystore/release.keystore
          RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD
          RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS
          RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD
          EOF

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare release artifact
        run: |
          mkdir -p output
          cp app/build/outputs/apk/release/app-release.apk "output/ffmpeg_tools_armv8a_${{ steps.version.outputs.version }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg_tools_armv8a_${{ steps.version.outputs.version }}
          path: output/*.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: FFmpeg Tools ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: output/*.apk
          generate_release_notes: true
